<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verify OTP</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #141e30, #243b55);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background-color: #1c2a3a;
        padding: 40px;
        width: 350px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        text-align: center;
        color: #ffffff;
    }

    h2 {
        margin-bottom: 25px;
        color: #00d4ff;
    }

    label {
        font-weight: 600;
        display: block;
        margin-bottom: 8px;
        text-align: left;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        outline: none;
        margin-bottom: 20px;
        background-color: #2f3e4e;
        color: white;
        font-size: 15px;
        text-align: center;
        letter-spacing: 3px;
    }

    input:focus {
        border: 2px solid #00d4ff;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background-color: #00d4ff;
        color: #1c2a3a;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #00bcd4;
    }

</style>

</head>
<body>

<div class="container">

    <h2>OTP Verification</h2>

    <form action="verifyOTP" method="post">

        <label>Enter OTP:</label>
        <input type="text" name="otp" maxlength="6" required>

        <button type="submit">Verify OTP</button>
    </form>

</div>

</body>
</html>
