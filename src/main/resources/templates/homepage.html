<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Home Page</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background-color: #ffffff;
        padding: 50px;
        width: 450px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    h2 {
        color: #333;
        margin-bottom: 20px;
        font-size: 28px;
    }

    p {
        color: #666;
        font-size: 16px;
        margin-bottom: 30px;
    }

    .btn {
        display: inline-block;
        padding: 12px 25px;
        background-color: #4facfe;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        background-color: #008cff;
    }

</style>

</head>
<body>

<div class="container">
    <h2>Welcome to Home Page 🎉</h2>
    <p>Your registration and OTP verification was successful.</p>
    <a href="/login" class="btn">Go to Login</a>
</div>

</body>
</html>
